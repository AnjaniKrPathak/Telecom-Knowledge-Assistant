services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin (optional UI) ────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rag.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Hugging Face reranker (Text-Embeddings-Inference) ───────────────────────
  # Powers com.rag.rerank.HuggingFaceRerankerProvider (rag.reranker.provider: huggingface).
  # Fully local, no API key — downloads the model from Hugging Face Hub once on first start,
  # then serves it from the hf-cache volume below. Matches rag.reranker.huggingface.base-url
  # (http://localhost:8081) in application.yml.
  #
  # NOTE: Ollama is intentionally NOT included here — the app expects it running locally on
  # its default port (11434), same as before.
  hf-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    # If you have an NVIDIA GPU available to Docker, swap the image above for a CUDA tag
    # (e.g. ghcr.io/huggingface/text-embeddings-inference:1.5) for significantly faster reranking.
    # On Apple Silicon (M1/M2/M3) hosts without a CPU-arm64 build available, uncomment:
    # platform: linux/amd64
    container_name: rag-hf-reranker
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-reranker-base"]
    ports:
      - "8081:80"
    volumes:
      - hf-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s   # first start downloads model weights, give it time before failing health checks

  # ── Neo4j (Knowledge Graph) ──────────────────────────────────────────────────
  # Powers com.rag.graph.* — entity/relationship extraction, graph search, dependency/root-cause/
  # impact analysis, and path finding over catalog entities (Offerings, Rules, Discounts, Bundles,
  # Change Requests, ...) and the documents/sheets they appear in. Matches neo4j.uri
  # (bolt://localhost:7687) in application.yml. Browser UI at http://localhost:7474.
  neo4j:
    image: neo4j:5-community
    container_name: rag-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/ragpassword
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"   # HTTP (browser UI)
      - "7687:7687"   # Bolt (driver protocol — used by the app)
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  hf-cache:
  neo4j-data:
  neo4j-logs:
