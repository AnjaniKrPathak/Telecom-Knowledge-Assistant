# Activate with: --spring.profiles.active=gpt   (or SPRING_PROFILES_ACTIVE=gpt)
#
# OpenAI GPT-4o — higher-quality, higher-cost tier. Use the `openai` profile instead
# for the cheaper gpt-3.5-turbo default.
# Requires: export OPENAI_API_KEY=sk-...

llm:
  provider: gpt
  model-name: gpt-4o
  base-url: https://api.openai.com/v1
  api-key: ${OPENAI_API_KEY}
  temperature: 0.7
  timeout-minutes: 5
