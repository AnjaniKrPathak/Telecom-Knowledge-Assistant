# Activate with: --spring.profiles.active=llama3   (or SPRING_PROFILES_ACTIVE=llama3)
#
# Local llama3 served by Ollama. No API key required. This mirrors the base
# application.yml defaults, so this profile is mostly useful as an explicit,
# discoverable "reset to local" switch alongside the other three provider profiles.

llm:
  provider: ollama
  model-name: llama3
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  api-key: ""
  temperature: 0.7
  timeout-minutes: 15
