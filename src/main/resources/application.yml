spring:
  application:
    name: rag-project

  # Loads webex.bot-token (and any other secrets) from a separate, git-ignored file so
  # nothing sensitive sits directly in this tracked application.yml. "optional:" means
  # startup won't fail if the file is missing (e.g. CI, or when using WEBEX_BOT_TOKEN
  # as an env var instead) — see config/webex-secrets.yml.example for the template.
  config:
    import: "optional:file:./config/webex-secrets.yml"

  profiles:
    active: default

  datasource:
    url: jdbc:postgresql://localhost:5434/ragdb
    username: raguser
    password: ragpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 30000
      validation-timeout: 5000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: 8080

# Ollama Configuration (base URL + embedding model — used regardless of chat provider)
ollama:
  base-url: http://localhost:11434
  chat-model: llama3
  embedding-model: nomic-embed-text
  timeout: 1500s

# LLM Chat Provider Configuration
# Defaults to local llama3 via Ollama. Override by activating a profile:
#   --spring.profiles.active=kimi   (or gpt / openai / llama3)
# See application-llama3.yml, application-kimi.yml, application-gpt.yml, application-openai.yml
llm:
  provider: ollama       # ollama | openai | gpt | kimi
  model-name: llama3
  base-url: ""           # blank = use ollama.base-url above; required for openai/gpt/kimi
  api-key: ""            # required for openai/gpt/kimi — set via env var in the profile file
  temperature: 0.7
  timeout-minutes: 15

# PgVector Configuration
pgvector:
  dimension: 768          # nomic-embed-text dimension
  table-name: document_embeddings

# Neo4j Configuration — powers the Knowledge Graph feature (see rag.graph.* below)
neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: ragpassword
  database: neo4j
  max-connection-pool-size: 50
  connection-acquisition-timeout-seconds: 30

# RAG Configuration
rag:
  chunk-size: 500
  chunk-overlap: 10
  max-results: 5        # top-k retrieved chunks
  ingestion:
    core-pool-size: 4     # threads always alive for concurrent document ingestion
    max-pool-size: 8      # max threads under load
    queue-capacity: 100   # files queued before max-pool-size kicks in
  hybrid:
    enabled: true             # combine vector search with Postgres keyword search
    candidate-multiplier: 4   # candidates pulled from EACH leg = max-results * this, before fusion
    rrf-k: 60                 # Reciprocal Rank Fusion smoothing constant
    min-vector-score: 0.7     # cosine-similarity floor for the vector leg
    fts-language: english     # Postgres text-search configuration (language)
  excel:
    rows-per-chunk: 1         # data rows grouped into a single embedded chunk (1 = one chunk per row)
    header-detection: true    # use the first non-blank row of each sheet as column headers
    max-cell-length: 2000     # truncate any single cell's text beyond this many characters
    skip-blank-rows: true     # don't create chunks for fully empty rows
    range-validation-enabled: true  # flag an ID whose value falls outside its sheet's documented range
    business-fields:          # spreadsheet column header -> metadata key, copied onto every
      "Offering Name": offeringName        # chunk built from a row that has that column, so
      "Flat Offering ID": flatOfferingId    # retrieval/debugging can key off these directly
      "Offering ID": offeringId             # instead of only full-text/vector matching
      "External ID": externalId
      "TUTI": tuti
  git:
    workspace-dir: ./git-workspace    # local clone location (one subfolder per connected repo)
    compute-diff-stats: true          # compute insertions/deletions/files-changed per commit
    embed-commits: true               # index commit messages into the vector store for RAG chat
    max-commits-per-sync: 20000       # safety cap per ingest/sync call
    default-sprint-length-days: 14    # used by the fixed-length sprint auto-generator
    core-pool-size: 2                 # threads always alive for git clone/sync jobs
    max-pool-size: 4                  # max threads under load
    queue-capacity: 50                # sync jobs queued before max-pool-size kicks in
  cache:
    enabled: true              # if the same question is asked again within the TTL, skip retrieval + LLM and return the cached answer
    ttl-minutes: 60            # how long a cached answer stays valid (1 hour)
    max-size: 500              # max distinct questions held in memory at once (LRU-evicted beyond this)
    normalize-whitespace: true # trim + collapse whitespace before using the question as a cache key
    case-sensitive: false      # "What is X?" and "what is x?" are treated as the same cached question
  memory:
    enabled: true              # fold prior turns into the prompt so follow-up questions resolve correctly
    max-turns: 5               # prior user/assistant turn PAIRS included as history in the prompt
    max-history-chars: 4000    # hard cap on the size of the history block injected into the prompt
    persist: true              # store every turn in Postgres (conversation_messages table)
    retention-days: 30         # nightly job purges conversation turns older than this
  feedback:
    enabled: true              # let accumulated thumbs up/down nudge retrieval ranking per source
    boost-weight: 0.03         # score adjustment applied per net vote (up - down) for a source
    max-boost: 0.2             # cap on the absolute adjustment any single source can accumulate
    min-votes-for-adjustment: 1 # a source needs at least this many net votes before it's nudged
    webex-text-shortcuts-enabled: true  # let Webex users reply thumbs up/down to rate the bot's last answer
    webex-comment-prompt-ttl-minutes: 5  # how long the bot waits for an optional comment after a Webex rating
  query-routing:
    enabled: true             # filter retrieval to one document type based on question keywords
    excel-keywords:           # if the question contains any of these, only type=EXCEL chunks are searched
      - "flat offering"
      - "offering id"
      - "offering name"
      - "external id"
      - "Relation Id"
      - "rule id"
      - "Discount Id"
      - "Price Key"
      - "Relation Id"
      - "Offering Template"
      - "Design Task"
      - "Find"
    docx-keywords:            # checked only if no excel-keyword matched; filters to type=DOCX
      - "what is"
      - "what are"
      - "how does"
      - "how do"
      - "how is"
      - "explain"
      - "why does"
      - "why is"
      - "describe"
  reranker:
    enabled: true              # rerank retrieved chunks for more accurate context before answering
    provider: huggingface      # huggingface | llm | none
    candidate-pool-size: 10    # vector-search fetch size BEFORE reranking (kept >= rag.max-results)
    fail-open: true            # if the reranker call fails, fall back to plain vector-similarity order
    huggingface:
      base-url: http://localhost:8081  # local Hugging Face Text-Embeddings-Inference (TEI) rerank server, no API key
      timeout-ms: 30000
  intent-routing:
    enabled: true               # route lookup questions (Offering Name/ID, CR ID, ...) to the Excel
                                 # catalog only, and explanation questions ("what is X", "explain Y",
                                 # "how does Z work") to the DOCX narrative chunks (FDS/BRD/rules) only
    fallback-when-empty: true   # if the category-filtered search returns nothing, retry unfiltered
                                 # instead of answering "I don't know" (covers docs ingested pre-feature)
  graph:
    enabled: true                        # master switch for the Neo4j knowledge-graph feature
    auto-ingest: true                    # extract entities/relationships during normal file ingestion
                                          # (in addition to/instead of running a one-off /api/graph/backfill)
    entity-co-occurrence: true           # link entities that appear together in the same chunk/row
    max-path-depth: 6                    # hop ceiling for graph search / shortest-path / all-paths
    max-dependency-depth: 4              # hop ceiling for dependency / root-cause / impact traversals
    backfill-batch-size: 500             # rows read per page when POST /api/graph/backfill scans document_embeddings
    query-augmentation-enabled: true    # when true, RagQueryService adds a short "related knowledge graph
                                          # context" block (dependencies/impact of entities in the retrieved
                                          # chunks) to the prompt — off by default so it can be evaluated
                                          # before it's part of every answer
    query-augmentation-max-entities: 5   # cap on how many recognized entities get graph-expanded per query

# Logging
logging:
  level:
    com.rag: DEBUG
    dev.langchain4j: INFO
    com.zaxxer.hikari: DEBUG

# Springdoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

# Webex Chatbot Configuration
webex:
  bot-token: ${WEBEX_BOT_TOKEN:}          # set in config/webex-secrets.yml (git-ignored) — see config/webex-secrets.yml.example
  api-base-url: https://webexapis.com/v1
  webhook-secret: ${WEBEX_WEBHOOK_SECRET:}  # optional, but recommended - must match the "secret" used when registering the webhook
  bot-email: ${WEBEX_BOT_EMAIL:msexpert@webex.bot}

  # --- Auto webhook sync: keeps the Webex webhook pointed at the current ngrok URL, no manual portal edits ---
  webhook-name: SpringBootWebhook          # used to find/create/update "our" webhook among all webhooks on the account
  webhook-target-path: /api/webex/webhook  # appended to the detected ngrok URL to build the webhook's targetUrl
  webhook-resource: messages               # only used when creating a brand-new webhook
  webhook-event: created                   # only used when creating a brand-new webhook
  remove-duplicate-webhooks: true          # if multiple webhooks share webhook-name, delete all but the oldest
  actions-webhook-name: SpringBootWebhookActions  # 2nd webhook (attachmentActions/created) powering inline Like/Dislike buttons
  attachment-actions-webhook-enabled: true  # send answers as Adaptive Cards with tappable Like/Dislike buttons instead of plain text
  thinking-status-enabled: true             # post a "🤔 Thinking..." placeholder and live-edit it (searching/drafting) while the answer is generated
  auto-sync-enabled: true                  # keep checking for ngrok URL changes after startup (not just once)
  auto-sync-interval-ms: 60000             # how often (ms) the background scheduler checks for a changed ngrok URL
  broadcast-delay-ms: 250                  # pause (ms) between each send in a /api/webex/broadcast batch, to stay under rate limits

# Ngrok Agent API (local) — used to auto-detect the current public tunnel URL
ngrok:
  api-url: http://localhost:4040/api/tunnels
  startup-max-retries: 10        # retries while waiting for the ngrok agent to come up at app startup
  startup-retry-delay-ms: 3000   # delay (ms) between those startup retries
