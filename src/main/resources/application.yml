spring:
  application:
    name: rag-project

  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: raguser
    password: ragpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8084

# Ollama Configuration
ollama:
  base-url: http://localhost:11434
  chat-model: llama3
  embedding-model: nomic-embed-text
  timeout: 120s

# PgVector Configuration
pgvector:
  dimension: 768          # nomic-embed-text dimension
  table-name: document_embeddings

# RAG Configuration
rag:
  chunk-size: 500
  chunk-overlap: 50
  max-results: 5          # top-k retrieved chunks

# Logging
logging:
  level:
    com.rag: DEBUG
    dev.langchain4j: INFO

# Springdoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
